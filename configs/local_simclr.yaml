seed: 826
output_dir: outputs/local_simclr
data:
  manifest_path: data/synthetic/manifest.csv
  batch_size: 8
  num_workers: 0
  image_size: 96
model:
  name: resnet18
  pretrained: false
  fine_tune_mode: head_only
  learning_rate: 0.001
  weight_decay: 0.0001
trainer:
  accelerator: cpu
  devices: 1
  max_epochs: 1
  precision: 32
  deterministic: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  log_every_n_steps: 1
runtime:
  experiment_name: local_simclr
  create_manifest_if_missing: true
  synthetic:
    num_subjects: 36
    positives_fraction: 0.5
    seed: 826
simclr:
  learning_rate: 0.001
  weight_decay: 0.0001
  projection_hidden_dim: 128
  projection_dim: 64
  temperature: 0.2

