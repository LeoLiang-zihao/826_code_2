seed: 826
output_dir: outputs/local_mimic_debug
data:
  manifest_path: data/manifests/mimic_subset_manifest.csv
  batch_size: 8
  num_workers: 0
  image_size: 160
model:
  name: resnet18
  pretrained: false
  fine_tune_mode: last1
  learning_rate: 0.0003
  weight_decay: 0.0001
trainer:
  accelerator: cpu
  devices: 1
  max_epochs: 1
  precision: 32
  deterministic: true
  limit_train_batches: 0.25
  limit_val_batches: 1.0
  log_every_n_steps: 1
runtime:
  experiment_name: local_mimic_debug
  create_manifest_if_missing: false

